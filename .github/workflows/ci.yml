name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Default to read-only. Jobs that need write access declare it explicitly.
permissions: read-all

jobs:
  # ──────────────────────────────────────────────
  # iOS — Build + test
  # ──────────────────────────────────────────────
  ios-tests:
    name: iOS Build & Test
    runs-on: macos-15
    permissions:
      contents: read
      actions: write  # upload-artifact
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Generate Xcode project
        run: |
          brew install xcodegen
          xcodegen generate

      - name: Build & Test
        run: |
          xcodebuild test \
            -project NOTE.xcodeproj \
            -scheme NOTE \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -only-testing:NOTETests \
            -resultBundlePath TestResults.xcresult \
            -enableCodeCoverage YES \
            | xcpretty --color || true

      - name: Convert coverage to LCOV
        run: |
          xcrun xccov view --report --json TestResults.xcresult > coverage.json
          python3 -c "
          import json, sys
          data = json.load(open('coverage.json'))
          out = open('lcov.info', 'w')
          for target in data.get('targets', []):
              for f in target.get('files', []):
                  out.write(f\"SF:{f['path']}\n\")
                  for func in f.get('functions', []):
                      out.write(f\"FN:{func['lineNumber']},{func['name']}\n\")
                      out.write(f\"FNDA:{func['executionCount']},{func['name']}\n\")
                  for line in f.get('lines', []):
                      out.write(f\"DA:{line['line']},{line['executionCount']}\n\")
                  out.write('end_of_record\n')
          "

      - uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe  # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          flags: ios
          fail_ci_if_error: false

      - name: Upload test results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        if: failure()
        with:
          name: ios-test-results
          path: TestResults.xcresult

  # ──────────────────────────────────────────────
  # SwiftLint
  # ──────────────────────────────────────────────
  swiftlint:
    name: SwiftLint
    runs-on: macos-15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Lint
        run: swiftlint lint --strict --reporter github-actions-logging

  # ──────────────────────────────────────────────
  # Dependency Review (PR only — requires public repo)
  # ──────────────────────────────────────────────
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48  # v4.9.0
