name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Default to read-only. Jobs that need write access declare it explicitly.
permissions: read-all

jobs:
  # ──────────────────────────────────────────────
  # iOS — Build + test
  # ──────────────────────────────────────────────
  ios-tests:
    name: iOS Build & Test
    runs-on: macos-15
    permissions:
      contents: read
      actions: write  # upload-artifact
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Cache Homebrew tools
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ~/Library/Caches/Homebrew/downloads
          key: brew-${{ runner.os }}-xcodegen-swiftlint

      - name: Generate Xcode project
        run: |
          brew install xcodegen
          xcodegen generate

      - name: Cache SPM packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: .spm-packages
          key: spm-${{ runner.os }}-${{ hashFiles('project.yml') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Build & Test
        run: |
          xcodebuild test \
            -project NOTE.xcodeproj \
            -scheme NOTE \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -only-testing:NOTETests \
            -clonedSourcePackagesDirPath .spm-packages \
            -resultBundlePath TestResults.xcresult \
            -enableCodeCoverage YES \
            | xcpretty --color || true

      - name: Generate coverage report
        run: |
          xcrun xccov view --report --json TestResults.xcresult > coverage.json

      - uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2  # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.json
          flags: ios
          fail_ci_if_error: false

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        if: failure()
        with:
          name: ios-test-results
          path: TestResults.xcresult

  # ──────────────────────────────────────────────
  # SwiftLint
  # ──────────────────────────────────────────────
  swiftlint:
    name: SwiftLint
    runs-on: macos-15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Cache Homebrew tools
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ~/Library/Caches/Homebrew/downloads
          key: brew-${{ runner.os }}-xcodegen-swiftlint
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Lint
        run: swiftlint lint --strict --reporter github-actions-logging

  # ──────────────────────────────────────────────
  # Dependency Review (PR only — requires public repo)
  # ──────────────────────────────────────────────
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294  # v5.0.0
