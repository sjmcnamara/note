name: NOTE
options:
  bundleIdPrefix: com.smcnamara
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  defaultConfig: Debug

packages:
  NostrSDK:
    url: https://github.com/rust-nostr/nostr-sdk-swift
    from: "0.44.2"

targets:
  NOTE:
    type: application
    platform: iOS
    sources:
      - App
      - Views
      - Design
      - Domain
      - Nostr
      - Assets.xcassets
      - Fonts
    dependencies:
      - package: NostrSDK
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: NO.TE
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIAppFonts:
          - InterTight.ttf
          - InstrumentSerif-Italic.ttf
        UILaunchScreen:
          UIImageName: LaunchLogo
          UIColorName: noteBg
        UIRequiresFullScreen: YES
        NSFaceIDUsageDescription: "Reveal your secret key"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.smcnamara.note
        DEVELOPMENT_TEAM: 3V55494FNM
        SWIFT_VERSION: 5.9
        MARKETING_VERSION: 0.13.0
        CURRENT_PROJECT_VERSION: 12
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: YES
        DERIVE_MACCATALYST_PRODUCT_BUNDLE_IDENTIFIER: YES
        SUPPORTS_LANDSCAPE_ORIENTATION_IPAD: NO
        INFOPLIST_KEY_UIRequiresFullScreen: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  NOTETests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    dependencies:
      - target: NOTE
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.smcnamara.note.tests
        DEVELOPMENT_TEAM: 3V55494FNM
        SWIFT_VERSION: 5.9
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: YES

schemes:
  NOTE:
    build:
      targets:
        NOTE: all
        NOTETests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - NOTETests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
