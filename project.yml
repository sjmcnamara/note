name: NOTE
options:
  bundleIdPrefix: com.smcnamara
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  defaultConfig: Debug

targets:
  NOTE:
    type: application
    platform: iOS
    sources:
      - App
      - Views
      - Design
      - Nostr
      - Assets.xcassets
      - Fonts
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: NO.TE
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIAppFonts:
          - InterTight.ttf
          - InstrumentSerif-Italic.ttf
        UILaunchScreen:
          UIImageName: LaunchLogo
          UIColorName: noteBg
        UIRequiresFullScreen: YES
        NSFaceIDUsageDescription: "Reveal your secret key"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.smcnamara.note
        DEVELOPMENT_TEAM: 3V55494FNM
        SWIFT_VERSION: 5.9
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_LANDSCAPE_ORIENTATION_IPAD: NO
        INFOPLIST_KEY_UIRequiresFullScreen: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

schemes:
  NOTE:
    build:
      targets:
        NOTE: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
